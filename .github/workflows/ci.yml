name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Frontend build
      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      # CLI type-check (entrypoints only, not tests)
      - name: Type-check CLI
        run: cd dimos-cli && deno check cli.ts mod.ts setup.ts
